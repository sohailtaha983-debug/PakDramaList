let __dbCache = null;

const getDB = () => __dbCache || initDB();

const saveDB = (db, skipFirebase = false) => {
  __dbCache = db;
  if (!window.__fbdb || skipFirebase) return;
  // Debounce writes so rapid updates don't hammer Firebase
  if (saveDB._timer) clearTimeout(saveDB._timer);
  saveDB._timer = setTimeout(() => {
    window.__fbdb.ref("/").set(db).catch(e => console.error("Firebase write error:", e));
  }, 400);
};

const patchDB = (path, value) => {
  if (!window.__fbdb) return;
  window.__fbdb.ref(path).set(value).catch(e => console.error("Firebase patch error:", e));
};

const findPersonByName = (people, name) => (people || []).find(p => p.name.toLowerCase() === String(name || "").toLowerCase());
const personName = (idOrName, db = getDB()) => {
  const person = (db.people || []).find(p => p.id === idOrName || p.name === idOrName);
  return person ? person.name : idOrName;
};

const migrateDB = (db) => {
  if (!db) db = {};
  if (!db.people) db.people = samplePeople;

  if (!db.movies) db.movies = [];
  if (!db.users) db.users = [];
  if (!db.reviews) db.reviews = [];
  if (!db.comments) db.comments = [];
  if (!db.news) db.news = [];
  if (!db.settings) db.settings = { siteName: "PakDramaList", tagline: "پاکستانی ڈراموں کی دنیا", maintenanceMode: false };
  db.people = db.people.map(p => ({ knownFor: [], ...p, roles: p.roles || [p.primaryRole || "Actor"] }));
  db.dramas = (db.dramas || []).map(d => {
    const castNames = Array.isArray(d.cast) ? d.cast : String(d.cast || "").split(",").map(x => x.trim()).filter(Boolean);
    const castIds = d.castIds || castNames.map(n => findPersonByName(db.people, n)?.id).filter(Boolean);
    const directorNames = Array.isArray(d.directors) ? d.directors : String(d.director || "").split(",").map(x => x.trim()).filter(Boolean);
    const writerNames = Array.isArray(d.writers) ? d.writers : String(d.writer || "").split(",").map(x => x.trim()).filter(Boolean);
    const directorIds = d.directorIds || directorNames.map(n => findPersonByName(db.people, n)?.id).filter(Boolean);
    const writerIds = d.writerIds || writerNames.map(n => findPersonByName(db.people, n)?.id).filter(Boolean);
    return { ...d, cast: castNames, castIds, directorIds, writerIds };
  });
  return db;
};

const avg = (arr) => arr.length ? (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1) : "N/A";
const fmtNum = (n) => n >= 1000 ? (n / 1000).toFixed(1) + "k" : n;

const dramaSlug = (title) => (title || "").toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");

const personSlug = (name) => (name || "")
  .toLowerCase()
  .trim()
  .replace(/[^a-z0-9]+/g, "-")

const slugify = (text) => text.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
const dramaUrl = (drama) => "#/drama/" + slugify(drama.title);
const openDramaPage = (drama) => {

};

const openMoviePage = (movie) => {
  if (!movie) return;
  window.location.hash = "/movie/" + slugify(movie.title);
  window.scrollTo({ top: 0, behavior: "smooth" });
};
const getRouteFromHash = () => {
  const hash = window.location.hash.replace(/^#\/?/, "");
  const [type, slug] = hash.split("/");
  const db = getDB();

  if (type === "drama") {
    return {
      type: "drama",
      item: (db.dramas || []).find(d => slugify(d.title) === slug || d.id === slug) || null
    };
  }

  if (type === "person") {
    return {
      type: "person",
      item: (db.people || []).find(p => personSlug(p.name) === slug || p.id === slug) || null
    };
  }

  if (type === "movie") {
    return {
      type: "movie",
      item: (db.movies || []).find(m => slugify(m.title) === slug || m.id === slug) || null
    };
  }

  return { type: null, item: null };
};

const getDramaFromHash = () => {
  const route = getRouteFromHash();
  return route.type === "drama" ? route.item : null;
};

  const fromIds = ids.map(id => (db.people || []).find(p => p.id === id)).filter(Boolean);

};

const DramaModal = ({ drama, onClose }) => {

  const [rating, setRating] = useState(0);
  const [review, setReview] = useState("");
  const [watchStatus, setWatchStatus] = useState("none");
  const db = getDB();

  useEffect(() => {
    if (user) {
      const saved = user.ratings?.[drama.id];
      if (saved) setRating(saved);
      const wl = user.watchlist?.find(w => w.dramaId === drama.id);
      if (wl) setWatchStatus(wl.status);
    }
  }, [drama.id, user]);

  const reviews = (db.reviews || []).filter(r => r.dramaId === drama.id);
  const avgRating = reviews.length > 0 ? avg(reviews.map(r => r.rating)) : drama.rating;

  const handleRate = (val) => {
    if (!user) return alert("Please login to rate!");
    setRating(val);
    const db2 = getDB();
    const u = db2.users.find(u => u.id === user.id);
    if (u) { u.ratings = { ...u.ratings, [drama.id]: val }; saveDB(db2); updateUser(u); }
  };

  const handleReview = () => {
    if (!user) return alert("Please login!");
    if (!rating) return alert("Please give a rating first.");
    if (!review.trim()) return alert("Please write a review.");
    const db2 = getDB();
    const existing = db2.reviews.findIndex(r => r.dramaId === drama.id && r.userId === user.id);
    const rev = { id: genId(), dramaId: drama.id, userId: user.id, username: user.username, rating, text: review.trim(), date: new Date().toISOString().slice(0, 10), likes: 0 };
    if (existing > -1) db2.reviews[existing] = rev; else db2.reviews.push(rev);
    saveDB(db2);
    setReview("");
    alert("Review submitted!");
  };

  const handleWatchStatus = (status) => {
    if (!user) return alert("Please login!");
    setWatchStatus(status);
    const db2 = getDB();
    const u = db2.users.find(u => u.id === user.id);
    if (!u) return;
    u.watchlist = u.watchlist || [];

  ];

  return (

      <div className="modal-box fade-in" style={{ maxWidth: 760 }} onClick={e => e.stopPropagation()}>
        <div className="drama-modal-header" style={{ display: "flex", gap: 20, marginBottom: 20 }}>
          <img src={drama.poster} alt={drama.title} className="drama-modal-poster" style={{ width: 140, height: 200, objectFit: "cover", borderRadius: 8, flexShrink: 0 }} />
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <h2 style={{ fontFamily: "Cinzel", color: COLORS.textPrimary, fontSize: 22, marginBottom: 2 }}>{drama.title}</h2>
                
              </div>
              <button onClick={onClose} style={{ background: "none", border: "none", color: COLORS.textMuted, fontSize: 22, cursor: "pointer", padding: "0 4px" }}>✕</button>

const CommentsSection = ({ dramaId }) => {
  const { user } = useAuth();
  const [text, setText] = useState("");
  const [replyTo, setReplyTo] = useState(null); // { id, username }
  const [replyText, setReplyText] = useState("");
  const [comments, setComments] = useState([]);
  const [sortBy, setSortBy] = useState("newest");

  const loadComments = () => {
    const db = getDB();
    setComments((db.comments || []).filter(c => c.dramaId === dramaId));
  };

  useEffect(() => { loadComments(); }, [dramaId]);

  const postComment = () => {
    if (!user) return alert("Please login to comment!");
    if (!text.trim()) return;
    const db2 = getDB();
    if (!db2.comments) db2.comments = [];
    db2.comments.push({
      id: genId(), dramaId, userId: user.id, username: user.username,
      text: text.trim(), date: new Date().toISOString(), likes: [],
      parentId: null, edited: false,
    });
    saveDB(db2);
    setText("");
    loadComments();
  };

  const postReply = (parentId) => {
    if (!user) return alert("Please login!");
    if (!replyText.trim()) return;
    const db2 = getDB();
    if (!db2.comments) db2.comments = [];
    db2.comments.push({
      id: genId(), dramaId, userId: user.id, username: user.username,
      text: replyText.trim(), date: new Date().toISOString(), likes: [],
      parentId, edited: false,
    });
    saveDB(db2);
    setReplyText("");
    setReplyTo(null);
    loadComments();
  };

  const toggleLike = (commentId) => {
    if (!user) return alert("Please login to like!");
    const db2 = getDB();
    const c = db2.comments.find(c => c.id === commentId);
    if (!c) return;
    const idx = c.likes.indexOf(user.id);
    if (idx > -1) c.likes.splice(idx, 1);
    else c.likes.push(user.id);
    saveDB(db2);
    loadComments();
  };

  const deleteComment = (commentId) => {
    if (!window.confirm("Delete this comment?")) return;
    const db2 = getDB();
    // Also delete all replies to this comment
    db2.comments = (db2.comments || []).filter(c => c.id !== commentId && c.parentId !== commentId);
    saveDB(db2);
    loadComments();
  };

  const fmtDate = (iso) => {
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return "just now";
    if (diff < 3600) return Math.floor(diff / 60) + "m ago";
    if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
    return d.toLocaleDateString("en-PK", { day: "numeric", month: "short", year: "numeric" });
  };

  const topLevel = comments.filter(c => !c.parentId);
  const getReplies = (parentId) => comments.filter(c => c.parentId === parentId);

  const sorted = [...topLevel].sort((a, b) => {
    if (sortBy === "newest") return new Date(b.date) - new Date(a.date);
    if (sortBy === "oldest") return new Date(a.date) - new Date(b.date);
    if (sortBy === "popular") return b.likes.length - a.likes.length;
    return 0;
  });

  const canDelete = (c) => user && (user.id === c.userId || ["admin", "moderator"].includes(user.role));

  const CommentBubble = ({ c, isReply = false }) => {
    const replies = getReplies(c.id);
    const liked = user && c.likes.includes(user.id);
    return (
      <div style={{ display: "flex", gap: 10, marginBottom: isReply ? 10 : 14 }}>
        <div style={{ flexShrink: 0, width: isReply ? 28 : 34, height: isReply ? 28 : 34, borderRadius: "50%", background: isReply ? COLORS.bgPanel : COLORS.green1, border: `1px solid ${COLORS.borderLight}`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: isReply ? 12 : 14, color: COLORS.textPrimary }}>
          {c.username[0].toUpperCase()}
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ background: COLORS.bgInput, border: `1px solid ${COLORS.border}`, borderRadius: isReply ? "0 10px 10px 10px" : "0 12px 12px 12px", padding: "10px 14px", marginBottom: 4 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: COLORS.green3 }}>{c.username}</span>
              {c.userId === getDB().users.find(u => u.role === "admin")?.id && (
                <span className="badge" style={{ background: COLORS.gold, color: "#111", fontSize: 9 }}>ADMIN</span>
              )}
              <span style={{ fontSize: 11, color: COLORS.textMuted }}>{fmtDate(c.date)}</span>
              {c.edited && <span style={{ fontSize: 10, color: COLORS.textMuted, fontStyle: "italic" }}>(edited)</span>}
            </div>
            <p style={{ fontSize: 13, color: COLORS.textSecondary, lineHeight: 1.65, wordBreak: "break-word" }}>{c.text}</p>
          </div>
          {/* Action row */}
          <div style={{ display: "flex", gap: 14, alignItems: "center", paddingLeft: 4 }}>
            <button onClick={() => toggleLike(c.id)} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 4, color: liked ? COLORS.green3 : COLORS.textMuted, fontSize: 12, transition: "color 0.2s" }}>
              <span style={{ fontSize: 14 }}>{liked ? "♥" : "♡"}</span>
              <span>{c.likes.length > 0 ? c.likes.length : ""}</span>
            </button>
            {!isReply && (
              <button onClick={() => setReplyTo(replyTo?.id === c.id ? null : { id: c.id, username: c.username })} style={{ background: "none", border: "none", cursor: "pointer", color: replyTo?.id === c.id ? COLORS.green3 : COLORS.textMuted, fontSize: 12, display: "flex", alignItems: "center", gap: 4 }}>
                💬 Reply {replies.length > 0 && `(${replies.length})`}
              </button>
            )}
            {canDelete(c) && (
              <button onClick={() => deleteComment(c.id)} style={{ background: "none", border: "none", cursor: "pointer", color: COLORS.textMuted, fontSize: 12 }}>🗑️ Delete</button>
            )}
          </div>

          {/* Reply input */}
          {replyTo?.id === c.id && (
            <div className="slide-in" style={{ marginTop: 8, display: "flex", gap: 8, alignItems: "flex-end" }}>
              <div style={{ flex: 1, background: COLORS.bgPanel, border: `1px solid ${COLORS.borderLight}`, borderRadius: 8, padding: "8px 12px" }}>
                <div style={{ fontSize: 11, color: COLORS.green4, marginBottom: 4 }}>Replying to @{replyTo.username}</div>

                  style={{ width: "100%", background: "transparent", border: "none", outline: "none", color: COLORS.textPrimary, fontSize: 13, resize: "none" }}
                  onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); postReply(c.id); } }} />
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                <Btn size="sm" onClick={() => postReply(c.id)}>Send</Btn>
                <Btn size="sm" variant="ghost" onClick={() => { setReplyTo(null); setReplyText(""); }}>✕</Btn>
              </div>
            </div>
          )}

          {/* Nested replies */}
          {replies.length > 0 && (
            <div style={{ marginTop: 10, paddingLeft: 12, borderLeft: `2px solid ${COLORS.border}` }}>
              {replies.map(r => <CommentBubble key={r.id} c={r} isReply />)}
            </div>
          )}
        </div>
      </div>
    );
  };

  return (
    <div className="fade-in">
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 14, color: COLORS.green4, fontWeight: 700 }}>
          💬 Discussion ({topLevel.length} comment{topLevel.length !== 1 ? "s" : ""})
        </div>
        <select value={sortBy} onChange={e => setSortBy(e.target.value)}
          style={{ background: COLORS.bgInput, border: `1px solid ${COLORS.border}`, borderRadius: 6, color: COLORS.textSecondary, padding: "4px 10px", fontSize: 12 }}>
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="popular">Most Liked</option>
        </select>
      </div>

      {/* Write comment box */}
      {user ? (
        <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
          <div style={{ width: 34, height: 34, borderRadius: "50%", background: COLORS.green1, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, flexShrink: 0 }}>
            {user.avatar}
          </div>
          <div style={{ flex: 1, background: COLORS.bgInput, border: `1px solid ${COLORS.borderLight}`, borderRadius: 12, padding: "10px 14px" }}>
            <textarea value={text} onChange={e => setText(e.target.value)} placeholder="Share your thoughts, favourite moments, or ask a question…" rows={2}
              style={{ width: "100%", background: "transparent", border: "none", outline: "none", color: COLORS.textPrimary, fontSize: 13, resize: "none" }}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); postComment(); } }} />
            <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 6 }}>
              <Btn size="sm" onClick={postComment} disabled={!text.trim()}>Post Comment</Btn>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ background: COLORS.bgInput, borderRadius: 10, padding: 14, marginBottom: 20, textAlign: "center", border: `1px solid ${COLORS.border}` }}>
          <span style={{ fontSize: 13, color: COLORS.textMuted }}>Sign in to join the discussion</span>
        </div>
      )}

      {/* Comments list */}
      {sorted.length === 0 ? (
        <div style={{ textAlign: "center", padding: "32px 0", color: COLORS.textMuted }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>💬</div>
          <div style={{ fontSize: 14 }}>No comments yet. Start the discussion!</div>
        </div>
      ) : (
        sorted.map(c => <CommentBubble key={c.id} c={c} />)
      )}
    </div>
  );
};

// ─── AUTH MODAL ───────────────────────────────────────────────────────────────
const AuthModal = ({ onClose, onSuccess }) => {
  const [mode, setMode] = useState("login");
  const [form, setForm] = useState({ username: "", email: "", password: "", confirm: "" });
  const [err, setErr] = useState("");

  const handle = () => {
    setErr("");
    const db = getDB();
    if (mode === "login") {
      const u = (db.users || []).find(u => (u.email === form.email || u.username === form.email) && u.password === form.password);
      if (!u) return setErr("Invalid credentials.");
      onSuccess(u);
    } else {
      if (!form.username || !form.email || !form.password) return setErr("All fields required.");
      if (form.password !== form.confirm) return setErr("Passwords don't match.");
      if ((db.users || []).find(u => u.email === form.email)) return setErr("Email already registered.");
      if ((db.users || []).find(u => u.username === form.username)) return setErr("Username taken.");
      const newUser = { id: genId(), username: form.username, email: form.email, password: form.password, role: "member", avatar: form.username[0].toUpperCase(), bio: "", joinDate: new Date().toISOString().slice(0, 10), watchlist: [], ratings: {}, reviews: {}, lists: [], following: [], followers: [] };
      (db.users || []).push(newUser);
      saveDB(db);
      onSuccess(newUser);
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box fade-in" style={{ maxWidth: 400 }} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h2 style={{ fontFamily: "Cinzel", color: COLORS.green3, fontSize: 22 }}>{mode === "login" ? "Sign In" : "Create Account"}</h2>
          <button onClick={onClose} style={{ background: "none", border: "none", color: COLORS.textMuted, fontSize: 20, cursor: "pointer" }}>✕</button>
        </div>
        {mode === "register" && <Input label="Username" value={form.username} onChange={v => setForm({ ...form, username: v })} />}
        <Input label={mode === "login" ? "Email or Username" : "Email"} value={form.email} onChange={v => setForm({ ...form, email: v })} />
        <Input label="Password" type="password" value={form.password} onChange={v => setForm({ ...form, password: v })} />
        {mode === "register" && <Input label="Confirm Password" type="password" value={form.confirm} onChange={v => setForm({ ...form, confirm: v })} />}
        {err && <div style={{ color: COLORS.danger, fontSize: 13, marginBottom: 12 }}>{err}</div>}
        <Btn onClick={handle} style={{ width: "100%", marginBottom: 14 }}>{mode === "login" ? "Sign In" : "Register"}</Btn>
        <div style={{ textAlign: "center", fontSize: 13, color: COLORS.textMuted }}>
          {mode === "login" ? <>Don't have an account? <span onClick={() => setMode("register")} style={{ color: COLORS.green3, cursor: "pointer" }}>Register</span></> : <>Already have an account? <span onClick={() => setMode("login")} style={{ color: COLORS.green3, cursor: "pointer" }}>Sign In</span></>}
        </div>
        <div style={{ marginTop: 16, padding: 12, background: COLORS.bgInput, borderRadius: 6, fontSize: 12, color: COLORS.textMuted }}>
          <strong style={{ color: COLORS.green4 }}>Demo accounts:</strong><br />
          Admin: admin@pkdramalist.com / admin123<br />
          User: user@test.com / user123
        </div>
      </div>
    </div>
  );
};

// ─── DRAMAS PAGE ──────────────────────────────────────────────────────────────
const DramasPage = () => {
  const db = getDB();
  const [selectedDrama, setSelectedDrama] = useState(null);
  const [search, setSearch] = useState("");
  const [genre, setGenre] = useState("");
  const [network, setNetwork] = useState("");
  const [status, setStatus] = useState("");
  const [year, setYear] = useState("");
  const [sortBy, setSortBy] = useState("rating");
  const [viewMode, setViewMode] = useState("grid");

  const years = [...new Set((db.dramas || []).map(d => d.year))].sort((a, b) => b - a);

  let filtered = db.dramas
    .filter(d => !search || d.title.toLowerCase().includes(search.toLowerCase()))
    .filter(d => !genre || d.genres.includes(genre))
    .filter(d => !network || d.network === network)
    .filter(d => !status || d.status === status)
    .filter(d => !year || d.year === parseInt(year));

  if (sortBy === "rating") filtered.sort((a, b) => b.rating - a.rating);
  else if (sortBy === "year") filtered.sort((a, b) => b.year - a.year);
  else if (sortBy === "views") filtered.sort((a, b) => b.views - a.views);
  else if (sortBy === "title") filtered.sort((a, b) => a.title.localeCompare(b.title));

  return (
    <div className="fade-in" style={{ maxWidth: 1200, margin: "0 auto", padding: "28px 20px" }}>
      <h1 style={{ fontFamily: "Cinzel", fontSize: 26, color: COLORS.textPrimary, marginBottom: 20 }}>Pakistani Dramas</h1>
      
      {/* Filters */}
      <Card style={{ padding: 16, marginBottom: 24 }}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 12, alignItems: "flex-end" }}>
          <div style={{ flex: "1 1 200px" }}>
            <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 4 }}>Search</div>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search dramas..." style={{ width: "100%", background: COLORS.bgInput, border: `1px solid ${COLORS.border}`, borderRadius: 6, color: COLORS.textPrimary, padding: "7px 12px", fontSize: 13 }} />
          </div>
          {[{ label: "Genre", val: genre, set: setGenre, opts: GENRES }, { label: "Network", val: network, set: setNetwork, opts: NETWORKS }, { label: "Status", val: status, set: setStatus, opts: DRAMA_STATUS }, { label: "Year", val: year, set: setYear, opts: years.map(String) }, { label: "Sort", val: sortBy, set: setSortBy, opts: ["rating", "year", "views", "title"] }].map(f => (
            <div key={f.label} style={{ flex: "1 1 130px" }}>
              <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 4 }}>{f.label}</div>
              <select value={f.val} onChange={e => f.set(e.target.value)} style={{ width: "100%", background: COLORS.bgInput, border: `1px solid ${COLORS.border}`, borderRadius: 6, color: COLORS.textPrimary, padding: "7px 10px", fontSize: 13 }}>
                <option value="">All</option>
                {f.opts.map(o => <option key={o} value={o}>{o}</option>)}
              </select>
            </div>
          ))}
          <Btn size="sm" variant="ghost" onClick={() => { setSearch(""); setGenre(""); setNetwork(""); setStatus(""); setYear(""); setSortBy("rating"); }}>Reset</Btn>
          <div style={{ display: "flex", gap: 4 }}>
            {["grid", "list"].map(m => <Btn key={m} size="sm" variant={viewMode === m ? "primary" : "ghost"} onClick={() => setViewMode(m)}>{m === "grid" ? "⊞" : "≡"}</Btn>)}
          </div>
        </div>
      </Card>

      <div style={{ color: COLORS.textMuted, fontSize: 13, marginBottom: 16 }}>{filtered.length} drama{filtered.length !== 1 ? "s" : ""} found</div>

      {viewMode === "grid" ? (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 16 }}>
          {filtered.map(d => <DramaCard key={d.id} drama={d} onOpen={openDramaPage} />)}
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {filtered.map((d, i) => (
            <Card key={d.id} onClick={() => openDramaPage(d)} style={{ display: "flex", gap: 16, padding: 12, alignItems: "center" }}>
              <div style={{ color: COLORS.textMuted, width: 24, textAlign: "center", fontWeight: 700 }}>{i + 1}</div>
              <img src={d.poster} alt={d.title} style={{ width: 56, height: 80, objectFit: "cover", borderRadius: 4 }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 15, fontWeight: 600, color: COLORS.textPrimary, marginBottom: 2 }}>{d.title}</div>
                <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 4 }}>{d.network} · {d.year} · {d.episodes} eps</div>
                <div>{d.genres.map(g => <span key={g} className="tag" style={{ fontSize: 11 }}>{g}</span>)}</div>
              </div>
              <div style={{ textAlign: "center" }}>
                <div style={{ color: COLORS.starFilled, fontWeight: 700, fontSize: 18 }}>★ {d.rating}</div>
                <div style={{ fontSize: 11, color: COLORS.textMuted }}>{fmtNum(d.ratingCount)}</div>
              </div>
              <span className="badge" style={{ background: d.status === "Completed" ? COLORS.green1 : COLORS.gold, color: "#fff" }}>{d.status}</span>
            </Card>
          ))}
        </div>
      )}
      {selectedDrama && <DramaModal drama={selectedDrama} onClose={() => setSelectedDrama(null)} />}
    </div>
  );
};

// ─── PROFILE PAGE ─────────────────────────────────────────────────────────────
const ProfilePage = () => {
  const { user, updateUser } = useAuth();
  const [editing, setEditing] = useState(false);
  const [bio, setBio] = useState(user?.bio || "");
  const [selectedDrama, setSelectedDrama] = useState(null);
  if (!user) return <div style={{ textAlign: "center", padding: 60, color: COLORS.textMuted }}>Please sign in to view your profile.</div>;

  const db = getDB();
  const userReviews = (db.reviews || []).filter(r => r.userId === user.id);
  const watchlist = (user.watchlist || []).map(w => ({ ...w, drama: (db.dramas || []).find(d => d.id === w.dramaId) })).filter(w => w.drama);

  const save = () => {
    const db2 = getDB();
    const u = db2.users.find(u => u.id === user.id);
    if (u) { u.bio = bio; saveDB(db2); updateUser(u); }
    setEditing(false);

  const WATCH_CATEGORIES = [
    { key: "watching", label: "Watching", color: COLORS.green3 },
    { key: "completed", label: "Completed", color: COLORS.green1 },

    { key: "on_hold", label: "On Hold", color: "#888" },
    { key: "dropped", label: "Dropped", color: COLORS.danger },

  return (
    <div className="fade-in" style={{ maxWidth: 1000, margin: "0 auto", padding: "28px 20px" }}>
      <Card style={{ padding: 24, marginBottom: 28 }}>
        <div style={{ display: "flex", gap: 20, alignItems: "flex-start" }}>

              <h2 style={{ fontFamily: "Cinzel", fontSize: 22, color: COLORS.textPrimary }}>{user.username}</h2>
              <span className="badge" style={{ background: user.role === "admin" ? COLORS.gold : COLORS.green1, color: user.role === "admin" ? "#111" : "#fff" }}>{user.role}</span>
            </div>
            <div style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 10 }}>Member since {user.joinDate}</div>
            {editing ? (
              <div>
                <textarea value={bio} onChange={e => setBio(e.target.value)} rows={3} placeholder="Tell us about yourself..." style={{ width: "100%", background: COLORS.bgInput, border: `1px solid ${COLORS.border}`, borderRadius: 6, color: COLORS.textPrimary, padding: 10, fontSize: 13, resize: "vertical", marginBottom: 8 }} />
                <div style={{ display: "flex", gap: 8 }}><Btn size="sm" onClick={save}>Save</Btn><Btn size="sm" variant="ghost" onClick={() => setEditing(false)}>Cancel</Btn></div>
              </div>
            ) : (
              <div>
                <p style={{ color: COLORS.textSecondary, fontSize: 14, marginBottom: 8 }}>{user.bio || "No bio yet."}</p>
                <Btn size="sm" variant="ghost" onClick={() => setEditing(true)}>✏️ Edit Bio</Btn>

            )}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, textAlign: "center" }}>
            {[{ label: "Watchlist", value: watchlist.length }, { label: "Reviews", value: userReviews.length }, { label: "Ratings", value: Object.keys(user.ratings || {}).length }, { label: "Following", value: (user.following || []).length }].map(s => (

            {(person.roles || ["Actor"]).map(r => <span key={r} className="badge" style={{ background: COLORS.green1, color: "#fff" }}>{r}</span>)}

        <div style={{ display: "flex", flexWrap: "wrap", gap: 16 }}>

        </div>
      )}
    </div>
  );
};

const MultiPersonPicker = ({ label, selectedIds, setSelectedIds, roleFilter }) => {
  const db = getDB();
  const [q, setQ] = useState("");
  const people = (db.people || []).filter(p => !roleFilter || (p.roles || []).includes(roleFilter));
  const filtered = people.filter(p => !q || p.name.toLowerCase().includes(q.toLowerCase())).slice(0, 8);
  const selected = selectedIds.map(id => people.find(p => p.id === id)).filter(Boolean);
  const add = (id) => { if (!selectedIds.includes(id)) setSelectedIds([...selectedIds, id]); setQ(""); };
  const remove = (id) => setSelectedIds(selectedIds.filter(x => x !== id));
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={{ display: "block", fontSize: 12, color: COLORS.textSecondary, marginBottom: 6 }}>{label}</label>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>
        {selected.length === 0 && <span style={{ color: COLORS.textMuted, fontSize: 12 }}>No {label.toLowerCase()} selected yet.</span>}
        {selected.map(p => (
          <span key={p.id} className="tag" onClick={() => remove(p.id)} style={{ background: COLORS.green1, color: "#fff" }}>
            {p.name} ✕
          </span>
        ))}
      </div>
      <input value={q} onChange={e => setQ(e.target.value)} placeholder={`Search ${label.toLowerCase()}...`} style={{ width: "100%", background: COLORS.bgInput, border: `1px solid ${COLORS.border}`, borderRadius: 6, color: COLORS.textPrimary, padding: "7px 10px", fontSize: 13, marginBottom: 6 }} />
      {(q || filtered.length > 0) && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(190px, 1fr))", gap: 8 }}>
          {filtered.map(p => (
            <div key={p.id} onClick={() => add(p.id)} style={{ display: "flex", alignItems: "center", gap: 8, background: selectedIds.includes(p.id) ? COLORS.bgPanel : COLORS.bgInput, border: `1px solid ${selectedIds.includes(p.id) ? COLORS.green2 : COLORS.border}`, borderRadius: 8, padding: 8, cursor: "pointer" }}>
              <img src={personPhoto(p)} alt={p.name} style={{ width: 34, height: 34, borderRadius: "50%", objectFit: "cover" }} />
              <div>
                <div style={{ fontSize: 13, color: COLORS.textPrimary, fontWeight: 700 }}>{p.name}</div>
                <div style={{ fontSize: 11, color: COLORS.textMuted }}>{(p.roles || []).join(", ")}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

const DramaForm = ({ initial = {}, onSave, onCancel }) => {
  const db = getDB();
  const initialCastIds = initial.castIds || (Array.isArray(initial.cast) ? initial.cast.map(n => findPersonByName(db.people, n)?.id).filter(Boolean) : []);
  const initialDirectorIds = initial.directorIds || String(initial.director || "").split(",").map(n => findPersonByName(db.people, n.trim())?.id).filter(Boolean);
  const initialWriterIds = initial.writerIds || String(initial.writer || "").split(",").map(n => findPersonByName(db.people, n.trim())?.id).filter(Boolean);
  const [castIds, setCastIds] = useState(initialCastIds);
  const [directorIds, setDirectorIds] = useState(initialDirectorIds);
  const [writerIds, setWriterIds] = useState(initialWriterIds);
  const [form, setForm] = useState({
    title: "", urduTitle: "", poster: "", synopsis: "", network: "", year: new Date().getFullYear(), episodes: 1, status: "Ongoing", rating: 7.0, ratingCount: 0, tags: "", genres: [], views: 0, ...initial,
    tags: Array.isArray(initial.tags) ? initial.tags.join(", ") : (initial.tags || ""),
    genres: initial.genres || [],
  });

  const toggleGenre = (g) => setForm(f => ({ ...f, genres: f.genres.includes(g) ? f.genres.filter(x => x !== g) : [...f.genres, g] }));

  const namesFromIds = (ids) => ids.map(id => (db.people || []).find(p => p.id === id)?.name).filter(Boolean);

  const handleSave = () => {
    if (!form.title) return alert("Title is required");
    if (castIds.length === 0) return alert("Please select at least one actor from Cast & Crew.");
    const castNames = namesFromIds(castIds);
    const directorNames = namesFromIds(directorIds);
    const writerNames = namesFromIds(writerIds);
    onSave({
      ...form,
      year: parseInt(form.year), episodes: parseInt(form.episodes),
      rating: parseFloat(form.rating), ratingCount: parseInt(form.ratingCount), views: parseInt(form.views),
      castIds, directorIds, writerIds,
      cast: castNames,
      director: directorNames.join(", "),
      writer: writerNames.join(", "),
      tags: String(form.tags || "").split(",").map(s => s.trim()).filter(Boolean),
    });
  };

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <AdminField label="Title (English) *" value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} />
        <AdminField label="Urdu Title" value={form.urduTitle} onChange={e => setForm({ ...form, urduTitle: e.target.value })} />
        <AdminField label="Poster URL" value={form.poster} onChange={e => setForm({ ...form, poster: e.target.value })} />
        <AdminField label="Network" value={form.network} onChange={e => setForm({ ...form, network: e.target.value })} opts={NETWORKS} />
        <AdminField label="Year" value={form.year} onChange={e => setForm({ ...form, year: e.target.value })} type="number" />
        <AdminField label="Episodes" value={form.episodes} onChange={e => setForm({ ...form, episodes: e.target.value })} type="number" />
        <AdminField label="Status" value={form.status} onChange={e => setForm({ ...form, status: e.target.value })} opts={DRAMA_STATUS} />
        <AdminField label="Rating (0-10)" value={form.rating} onChange={e => setForm({ ...form, rating: e.target.value })} type="number" />
        <AdminField label="Rating Count" value={form.ratingCount} onChange={e => setForm({ ...form, ratingCount: e.target.value })} type="number" />
        <AdminField label="Views" value={form.views} onChange={e => setForm({ ...form, views: e.target.value })} type="number" />
      </div>
      <AdminField label="Synopsis" value={form.synopsis} onChange={e => setForm({ ...form, synopsis: e.target.value })} ta />
      <Card style={{ padding: 16, marginBottom: 16, background: COLORS.bgPanel }}>
        <div style={{ color: COLORS.green4, fontWeight: 700, marginBottom: 12 }}>Cast & Crew from Saved People</div>
        <MultiPersonPicker label="Actors / Cast" selectedIds={castIds} setSelectedIds={setCastIds} roleFilter="Actor" />
        <MultiPersonPicker label="Directors" selectedIds={directorIds} setSelectedIds={setDirectorIds} roleFilter="Director" />
        <MultiPersonPicker label="Writers" selectedIds={writerIds} setSelectedIds={setWriterIds} roleFilter="Writer" />
        <div style={{ color: COLORS.textMuted, fontSize: 12 }}>Need a person who is not listed? Go to Admin Panel → Add Person first, then come back here.</div>
      </Card>
      <AdminField label="Tags (comma separated)" value={form.tags} onChange={e => setForm({ ...form, tags: e.target.value })} />
      <div style={{ marginBottom: 16 }}>
        <label style={{ display: "block", fontSize: 12, color: COLORS.textSecondary, marginBottom: 6 }}>Genres</label>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {GENRES.map(g => (
            <span key={g} onClick={() => toggleGenre(g)} className="tag" style={{ background: form.genres.includes(g) ? COLORS.green1 : COLORS.bgPanel, color: form.genres.includes(g) ? "#fff" : COLORS.green4 }}>{g}</span>
          ))}
        </div>
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        <Btn onClick={handleSave}>💾 Save Drama</Btn>
        {onCancel && <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>}
      </div>
    </div>
  );
};

const AdminPeople = ({ db, refresh }) => {

        <div style={{ display: "flex", gap: 8 }}>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search people..." style={{ background: COLORS.bgInput, border: `1px solid ${COLORS.border}`, borderRadius: 6, color: COLORS.textPrimary, padding: "6px 12px", fontSize: 13 }} />

        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 14 }}>
        {filtered.map(p => (
          <Card key={p.id} style={{ padding: 14 }}>
            <div style={{ display: "flex", gap: 12 }}>
              <img src={personPhoto(p)} alt={p.name} style={{ width: 68, height: 68, borderRadius: "50%", objectFit: "cover", border: `1px solid ${COLORS.borderLight}` }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 15, color: COLORS.textPrimary, fontWeight: 700 }}>{p.name}</div>
                <div style={{ margin: "5px 0" }}>{(p.roles || []).map(r => <span key={r} className="badge" style={{ background: COLORS.bgPanel, border: `1px solid ${COLORS.border}`, color: COLORS.green4, marginRight: 4 }}>{r}</span>)}</div>
                <div style={{ color: COLORS.textMuted, fontSize: 12, lineHeight: 1.4 }}>{p.bio ? p.bio.slice(0, 70) : "No bio yet."}</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
              <Btn size="sm" variant="ghost" onClick={() => setEditing(p)}>✏️ Edit</Btn>

        ))}
      </div>
      {editing && <div className="modal-overlay" onClick={() => setEditing(null)}><div className="modal-box fade-in" style={{ maxWidth: 720 }} onClick={e => e.stopPropagation()}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}><h2 style={{ fontFamily: "Cinzel", fontSize: 20, color: COLORS.green3 }}>Edit: {editing.name}</h2><button onClick={() => setEditing(null)} style={{ background: "none", border: "none", color: COLORS.textMuted, fontSize: 20, cursor: "pointer" }}>✕</button></div><PersonForm initial={editing} onSave={(data) => { const db2 = getDB(); const idx = db2.people.findIndex(p => p.id === editing.id); if (idx > -1) db2.people[idx] = { ...db2.people[idx], ...data }; saveDB(db2); setEditing(null); refresh(); }} onCancel={() => setEditing(null)} /></div></div>}

const AdminUsers = ({ db, refresh, currentUser }) => {

  const deleteUser = (userId) => {
    if (userId === currentUser.id) return alert("Cannot delete your own account.");

    const db2 = getDB();
    db2.users = db2.users.filter(u => u.id !== userId);
    saveDB(db2); refresh();
  };

  return (
    <div>

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("home");
  const [user, setUser] = useState(null);
  const [authMode, setAuthMode] = useState(null);
  const [route, setRoute] = useState({ type: null, item: null });
  const [dbReady, setDbReady] = useState(false);
  const [dbError, setDbError] = useState(null);

  useEffect(() => {
    const syncRoute = () => setRoute(getRouteFromHash());
    syncRoute();
    window.addEventListener("hashchange", syncRoute);

    // Show site immediately with sample data, then sync from Firebase
    if (!__dbCache) {
      __dbCache = initDB();
    }
    setDbReady(true);

    // Then connect Firebase in background
    if (window.__fbdb) {
      window.__fbdb.ref("/").on("value", (snapshot) => {
        const data = snapshot.val();
        if (!data) {
          // First run — seed Firebase with sample data
          window.__fbdb.ref("/").set(__dbCache).catch(e => console.error("Seed error:", e));
        } else {
          __dbCache = migrateDB(data);
          // Re-check session after data loads
          const savedId = localStorage.getItem("pakdramalist_session");
          if (savedId) {
            const u = (__dbCache.users || []).find(u => u.id === savedId);
            if (u) setUser(u);
          }
          setDbReady(prev => { if (!prev) return true; return prev; });
        }
      }, (error) => {
        console.error("Firebase error:", error);
        setDbError("Firebase connection failed. Check your database Rules are set to public.");
      });
    } else {
      setDbError("Firebase not loaded — running with sample data only.");
    }

    // Restore session from localStorage
    const savedId = localStorage.getItem("pakdramalist_session");
    if (savedId && __dbCache) {
      const u = (__dbCache.users || []).find(u => u.id === savedId);
      if (u) setUser(u);
    }

    return () => window.removeEventListener("hashchange", syncRoute);
  }, []);

  const login = (u) => {
    setUser(u);
    localStorage.setItem("pakdramalist_session", u.id);
    setAuthMode(null);
  };

  const logout = () => {
    setUser(null);
    localStorage.removeItem("pakdramalist_session");
    window.location.hash = "";
    setPage("home");
  };

  const updateUser = (u) => setUser({ ...u });
  const openAuth = (mode) => setAuthMode(mode);
  const navigatePage = (nextPage) => {
    if (window.location.hash) window.location.hash = "";
    setRoute({ type: null, item: null });
    setPage(nextPage);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  // Loading screen while Firebase connects
  if (!dbReady) {
    return (
      <>
        <GlobalStyle />
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, background: COLORS.bg }}>
          <div style={{ fontFamily: "Cinzel", fontSize: 28, color: COLORS.green3 }}>PakDramaList</div>
          <div style={{ width: 48, height: 48, border: `4px solid ${COLORS.border}`, borderTopColor: COLORS.green3, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
          <div style={{ color: COLORS.textMuted, fontSize: 13 }}>Connecting to database…</div>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      </>
    );
  }

  const db = getDB();
  const settings = db.settings || {};

  return (
    <AuthCtx.Provider value={{ user, login, logout, updateUser }}>
      <GlobalStyle />
      {dbError && (
        <div style={{ background: COLORS.dangerBg, borderBottom: `1px solid ${COLORS.danger}`, padding: "8px 16px", fontSize: 13, color: "#f88", textAlign: "center" }}>
          ⚠️ {dbError}
        </div>
      )}
      {settings.maintenanceMode && user?.role !== "admin" ? (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
          <div style={{ fontSize: 60 }}>🔧</div>
          <div style={{ fontFamily: "Cinzel", fontSize: 28, color: COLORS.green3 }}>Site Under Maintenance</div>
          <div style={{ color: COLORS.textSecondary }}>We'll be back soon. شکریہ</div>
        </div>
      ) : (
        <>
          <Navbar page={page} setPage={navigatePage} openAuth={openAuth} />
          <main>
            {route.type === "drama" && route.item ? (
              <DramaPage drama={route.item} setPage={navigatePage} />
            ) : route.type === "person" && route.item ? (
              <PersonPage person={route.item} setPage={navigatePage} />
            ) : route.type === "movie" && route.item ? (
              <MoviePage movie={route.item} setPage={navigatePage} />
            ) : (
              <>
                {page === "home" && <HomePage setPage={navigatePage} />}
                {page === "dramas" && <DramasPage />}
                {page === "movies" && <MoviesPage />}
                {page === "top" && <TopRatedPage />}
                {page === "news" && <NewsPage />}
                {page === "community" && <CommunityPage />}
                {page === "profile" && <ProfilePage />}
                {page === "watchlist" && <WatchlistPage />}
                {page === "admin" && <AdminPanel />}
              </>
            )}
          </main>
          <footer style={{ background: COLORS.bgCard, borderTop: `1px solid ${COLORS.border}`, padding: "28px 20px", marginTop: 40, textAlign: "center" }}>
            <div style={{ fontFamily: "Cinzel", fontSize: 18, color: COLORS.green3, marginBottom: 4 }}>{settings.siteName || "PakDramaList"}</div>
            <div style={{ color: COLORS.textMuted, fontSize: 12 }}>© 2026 PakDramaList. Pakistani dramas, movies & stars.</div>
          </footer>
          {authMode && <AuthModal onClose={() => setAuthMode(null)} onSuccess={login} />}
        </>
      )}
    </AuthCtx.Provider>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
